apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: fintech
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: grafana
  # NodePort: UI acessível em http://$(minikube ip):30300
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30300
