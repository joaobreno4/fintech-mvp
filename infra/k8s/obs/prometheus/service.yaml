apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: fintech
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: prometheus
  # NodePort: UI acessível em http://$(minikube ip):30090
  type: NodePort
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 30090
