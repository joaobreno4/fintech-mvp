apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: fintech
  labels:
    app.kubernetes.io/name: transaction-service
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transaction-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transaction-service
        app.kubernetes.io/part-of: fintech-mvp
        app.kubernetes.io/component: backend
    spec:
      # ── Dependências: aguarda Postgres e Kafka antes de iniciar ─────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "Aguardando postgres-svc:5432..."
                sleep 3
              done
              echo "Postgres disponível."

        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka-svc 29092; do
                echo "Aguardando kafka-svc:29092..."
                sleep 3
              done
              echo "Kafka disponível."

      containers:
        - name: transaction-service
          # Imagem local buildada e carregada via:
          #   eval $(minikube docker-env)
          #   docker build -t transaction-service:latest apps/transaction-service/
          image: transaction-service:latest

          # IfNotPresent: usa a imagem do cache local do nó.
          # Never seria mais restritivo, mas IfNotPresent é mais seguro
          # caso o cluster tente um pull acidental em registry público.
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ── Variáveis de ambiente ────────────────────────────────────────────
          # ConfigMap global: URLs de infra (datasource, kafka, jaeger)
          envFrom:
            - configMapRef:
                name: fintech-app-config
            # Secret: credenciais do banco (SPRING_DATASOURCE_USERNAME/PASSWORD)
            - secretRef:
                name: fintech-app-secret

          # ── Startup Probe ────────────────────────────────────────────────────
          # Dá até 3min (18 × 10s) para o Spring Boot inicializar antes de
          # ativar liveness/readiness. Evita kill prematuro durante cold start.
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
            timeoutSeconds: 5

          # ── Liveness Probe ───────────────────────────────────────────────────
          # Reinicia o container se o processo travar (deadlock, OOM, etc.)
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Readiness Probe ──────────────────────────────────────────────────
          # Remove o Pod do balanceador enquanto não estiver pronto para tráfego
          # (ex: aguardando conexão com Kafka ou Postgres estabilizar)
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"
