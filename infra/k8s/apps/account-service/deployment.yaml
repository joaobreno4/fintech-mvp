apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: fintech
  labels:
    app.kubernetes.io/name: account-service
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: account-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account-service
        app.kubernetes.io/part-of: fintech-mvp
        app.kubernetes.io/component: backend
    spec:
      # ── Dependências: aguarda Postgres e Kafka antes de iniciar ─────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "Aguardando postgres-svc:5432..."
                sleep 3
              done
              echo "Postgres disponível."

        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka-svc 29092; do
                echo "Aguardando kafka-svc:29092..."
                sleep 3
              done
              echo "Kafka disponível."

      containers:
        - name: account-service
          # Imagem local buildada e carregada via:
          #   eval $(minikube docker-env)
          #   docker build -t account-service:latest apps/account-service/
          image: account-service:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8081
              protocol: TCP

          # ── Variáveis de ambiente ────────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: fintech-app-config
            - secretRef:
                name: fintech-app-secret

          # O account-service é um Kafka consumer puro — não expõe endpoint de
          # negócio, mas o Spring Boot Actuator sobe na porta 8081 normalmente.

          # ── Startup Probe ────────────────────────────────────────────────────
          # Até 3min para inicializar (consumer precisa conectar ao Kafka e
          # ao Postgres antes de reportar UP no health check)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
            timeoutSeconds: 5

          # ── Liveness Probe ───────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Readiness Probe ──────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"
