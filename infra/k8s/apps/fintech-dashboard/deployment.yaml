apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintech-dashboard
  namespace: fintech
  labels:
    app.kubernetes.io/name: fintech-dashboard
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fintech-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fintech-dashboard
        app.kubernetes.io/part-of: fintech-mvp
        app.kubernetes.io/component: frontend
    spec:
      initContainers:
        - name: wait-for-transaction-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z transaction-service-svc 8080; do
                echo "Aguardando transaction-service-svc:8080..."
                sleep 3
              done
              echo "transaction-service disponível."

      containers:
        - name: fintech-dashboard
          # Build local: eval $(minikube docker-env)
          # docker build -t fintech-dashboard:latest apps/fintech-dashboard/
          image: fintech-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001

          env:
            # URL do backend consumida pelo next.config.mjs (rewrite server-side)
            # e pela API Route /api/outbox-metrics (fetch server-side no container)
            - name: TRANSACTION_SERVICE_URL
              value: "http://transaction-service-svc.fintech.svc.cluster.local:8080"

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
