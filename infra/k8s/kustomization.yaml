apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── IMPORTANTE: sem campo `namespace:` global aqui ───────────────────────────
# Todos os recursos filhos já declaram seu namespace individualmente no metadata:
#   - recursos fintech/*  →  namespace: fintech  (hardcoded nos YAMLs)
#   - argocd/*            →  namespace: argocd   (hardcoded no install.yaml)
#   - argocd-app.yaml     →  namespace: argocd   (hardcoded no metadata)
#
# Um `namespace: fintech` global aqui causaria ID conflict no Kustomize:
# o transformador tentaria reescrever namespaces que já estão definidos,
# gerando dois recursos com o mesmo ID (ex: Namespace/fintech/fintech).

resources:
  # ── Base ────────────────────────────────────────────────────────────────────
  - base/namespace.yaml
  - base/secret.yaml
  - base/secret-app.yaml
  - base/configmap.yaml

  # ── Infraestrutura ──────────────────────────────────────────────────────────
  - infra/postgres
  - infra/kafka

  # ── Aplicações + API Gateway (Ingress NGINX) ─────────────────────────────────
  - apps

  # ── Observabilidade ──────────────────────────────────────────────────────────
  - obs/jaeger
  - obs/prometheus
  - obs/grafana

  # ── GitOps: ArgoCD ───────────────────────────────────────────────────────────
  # O argocd/kustomization.yaml instala o ArgoCD no namespace argocd.
  # Recursos do ArgoCD ficam isolados — sem interferência com o namespace fintech.
  - argocd

  # Application do ArgoCD: namespace argocd declarado no próprio metadata.
  # Não precisa de patch de override pois não há transformação global de namespace.
  - argocd-app.yaml
