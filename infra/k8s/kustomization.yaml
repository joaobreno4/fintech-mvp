apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace aplicado a todos os recursos filhos
namespace: fintech

resources:
  # ── Base ────────────────────────────────────────────────────────────────────
  - base/namespace.yaml
  - base/secret.yaml
  - base/secret-app.yaml
  - base/configmap.yaml

  # ── Infraestrutura ──────────────────────────────────────────────────────────
  - infra/postgres
  - infra/kafka

  # ── Aplicações ──────────────────────────────────────────────────────────────
  - apps/transaction-service
  - apps/account-service
  - apps/fintech-dashboard

  # ── Observabilidade ──────────────────────────────────────────────────────────
  - obs/jaeger
  - obs/prometheus
  - obs/grafana
