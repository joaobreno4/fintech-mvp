apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── Instalação do ArgoCD via remote base ──────────────────────────────────────
# Referencia o manifesto oficial upstream diretamente — sem copiar ~7000 linhas
# para o repositório. O Kustomize faz o download no momento do apply.
#
# Versão pinada: v2.11.3 (LTS atual em Jun/2026).
# Para atualizar: troque a tag e rode `kubectl kustomize infra/k8s/argocd/ | kubectl apply -f -`
# Changelog: https://github.com/argoproj/argo-cd/releases/tag/v2.11.3
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.11.3/manifests/install.yaml

# Força todos os recursos do manifesto upstream para o namespace argocd.
# Sem isso, alguns CRDs e ClusterRoles ficam sem namespace e podem conflitar.
namespace: argocd

# ── Patches de hardening para Minikube (dev) ─────────────────────────────────
# Remove o HorizontalPodAutoscaler do argocd-server (não há metrics-server
# habilitado por padrão no Minikube, o que causaria erro de reconciliação).
patches:
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-applicationset-controller
        namespace: argocd
    target:
      kind: Deployment
      name: argocd-applicationset-controller
      # ApplicationSet controller é opcional em dev — reduz footprint de memória.
      # Reative em produção removendo este patch.
