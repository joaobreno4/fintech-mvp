apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: fintech
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: messaging
    app.kubernetes.io/version: "7.6.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: fintech-mvp
        app.kubernetes.io/component: messaging
    spec:
      # Garante que o Zookeeper esteja pronto antes de iniciar o broker
      initContainers:
        - name: wait-for-zookeeper
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z zookeeper-svc 2181; do
                echo "Aguardando Zookeeper em zookeeper-svc:2181..."
                sleep 2
              done
              echo "Zookeeper disponível."

      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: internal
              containerPort: 29092   # Listener interno (pod-to-pod)
              protocol: TCP
            - name: external
              containerPort: 9092    # Listener externo (NodePort / port-forward)
              protocol: TCP

          env:
            # IP do próprio Pod injetado pelo Downward API.
            # Usado tanto no ADVERTISED_LISTENERS quanto para gerar o BROKER_ID
            # dinamicamente, evitando NodeExistsException no Zookeeper quando
            # um Pod substituto sobe antes do ephemeral node do anterior expirar.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

            # Gera BROKER_ID a partir do último octeto do IP do Pod (0-255).
            # Elimina conflito de ID entre Pod antigo (ainda no ZK) e novo Pod.
            - name: KAFKA_BROKER_ID_COMMAND
              value: "echo ${POD_IP} | awk -F. '{print $4}'"

            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper-svc:2181"

            # INTERNAL usa o IP do Pod (inter-broker e producer/consumer internos)
            # EXTERNAL usa localhost para acesso via kubectl port-forward
            - name: KAFKA_LISTENERS
              value: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092"

            - name: KAFKA_ADVERTISED_LISTENERS
              value: "INTERNAL://$(POD_IP):29092,EXTERNAL://localhost:9092"

            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"

            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"

            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"

            - name: KAFKA_LOG4J_LOGGERS
              value: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:9092
            # Kafka Confluent pode levar 90-120s para inicializar completamente.
            # initialDelaySeconds generoso evita que a liveness mate o processo
            # antes do broker estar pronto para aceitar conexões.
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 15
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:9092
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 5

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "800m"
              memory: "1Gi"
