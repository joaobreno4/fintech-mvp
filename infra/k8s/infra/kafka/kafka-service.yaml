apiVersion: v1
kind: Service
metadata:
  name: kafka-svc
  namespace: fintech
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: messaging
spec:
  # ClusterIP expõe o listener INTERNAL (29092) para os microsserviços.
  # O listener EXTERNAL (9092) fica acessível via `kubectl port-forward`
  # sem necessidade de NodePort em ambiente de dev.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: internal
      port: 29092
      targetPort: internal
      protocol: TCP
    - name: external
      port: 9092
      targetPort: external
      protocol: TCP
