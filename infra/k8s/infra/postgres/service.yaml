apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: fintech
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: database
spec:
  # ClusterIP: banco acessível apenas dentro do cluster.
  # Nenhuma porta é exposta para o host — isolamento total.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
