# Credenciais de acesso ao banco para os microsserviços Java.
# Separado do secret do Postgres (que usa POSTGRES_USER/PASSWORD para o initdb)
# para seguir o princípio do menor privilégio — cada Secret tem um único consumidor.
#
# Valores idênticos ao fintech-postgres-secret, mas com chaves no formato
# que o Spring Boot lê via envFrom (SPRING_DATASOURCE_USERNAME / PASSWORD).
#
# Para gerar:
#   echo -n "fintech_admin" | base64  →  ZmludGVjaF9hZG1pbg==
#   echo -n "fintech_pass"  | base64  →  ZmludGVjaF9wYXNz
apiVersion: v1
kind: Secret
metadata:
  name: fintech-app-secret
  namespace: fintech
  labels:
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: app-credentials
type: Opaque
data:
  SPRING_DATASOURCE_USERNAME: ZmludGVjaF9hZG1pbg==   # fintech_admin
  SPRING_DATASOURCE_PASSWORD: ZmludGVjaF9wYXNz        # fintech_pass
