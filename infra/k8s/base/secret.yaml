# ATENÇÃO: valores são base64 de strings simples (dev only).
# Em produção, use External Secrets Operator ou Sealed Secrets.
#
# Para gerar:  echo -n "fintech_admin" | base64  →  ZmludGVjaF9hZG1pbg==
#              echo -n "fintech_pass"  | base64  →  ZmludGVjaF9wYXNz
#              echo -n "fintech"       | base64  →  ZmludGVjaA==
apiVersion: v1
kind: Secret
metadata:
  name: fintech-postgres-secret
  namespace: fintech
  labels:
    app.kubernetes.io/part-of: fintech-mvp
    app.kubernetes.io/component: database
type: Opaque
data:
  POSTGRES_USER: ZmludGVjaF9hZG1pbg==      # fintech_admin
  POSTGRES_PASSWORD: ZmludGVjaF9wYXNz      # fintech_pass
  POSTGRES_DB: ZmludGVjaA==                # fintech
