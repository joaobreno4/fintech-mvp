server:
  port: 8080

spring:
  application:
    name: transaction-service

  datasource:
    # Valores resolvidos em runtime via variável de ambiente (K8s Secret / .env local).
    # Nunca commitar credenciais reais neste arquivo.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fintech}
    username: ${SPRING_DATASOURCE_USERNAME:fintech_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' é aceitável em dev. Em produção usar 'validate' + Flyway/Liquibase.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    # show-sql gera volume de log alto em produção — desativar via env
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        format_sql: false
    open-in-view: false

  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1

# ==========================================
# CONFIGURAÇÃO DE ACTUATOR E METRICAS (SRE)
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  metrics:
    tags:
      application: ${spring.application.name}
  # ── Distributed Tracing (OpenTelemetry → Jaeger) ──────────────────────────
  tracing:
    sampling:
      probability: 1.0   # 100% de amostragem — reduzir para 0.1 em produção
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces   # OTLP/HTTP (Jaeger all-in-one)
