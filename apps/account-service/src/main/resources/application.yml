server:
  port: 8081

spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://localhost:5432/fintech
    username: fintech_admin
    password: fintech_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: account-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  metrics:
    tags:
      application: ${spring.application.name}
  # ── Distributed Tracing (OpenTelemetry → Jaeger) ──────────────────────────
  tracing:
    sampling:
      probability: 1.0   # 100% de amostragem — reduzir para 0.1 em produção
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces   # OTLP/HTTP (Jaeger all-in-one)
