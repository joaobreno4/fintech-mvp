server:
  port: 8081

spring:
  application:
    name: account-service

  datasource:
    # Valores resolvidos em runtime via variável de ambiente (K8s Secret / .env local).
    # Nunca commitar credenciais reais neste arquivo.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fintech}
    username: ${SPRING_DATASOURCE_USERNAME:fintech_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'validate' é o padrão seguro para produção — use Flyway/Liquibase para migrações.
      # Sobrescreva com SPRING_JPA_HIBERNATE_DDL_AUTO=update apenas em dev local.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    # show-sql gera volume de log alto em produção — desativar via env
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        format_sql: false
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: account-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  metrics:
    tags:
      application: ${spring.application.name}
  # ── Distributed Tracing (OpenTelemetry → Jaeger) ──────────────────────────
  tracing:
    sampling:
      probability: 1.0   # 100% de amostragem — reduzir para 0.1 em produção
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces   # OTLP/HTTP (Jaeger all-in-one)
